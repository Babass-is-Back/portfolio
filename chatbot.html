  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #0c0c0f;
      color: #f0f0f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .demo-text {
      text-align: center;
      opacity: 0.3;
      font-family: 'Syne', sans-serif;
      font-size: 18px;
    }

    .chat-fab {
      position: fixed;
      bottom: 28px; right: 28px;
      width: 58px; height: 58px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6c63ff, #3ecfcf);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 32px rgba(108,99,255,.45);
      z-index: 9999;
      transition: transform .25s cubic-bezier(.34,1.56,.64,1), box-shadow .25s;
    }

    .chat-fab:hover {
      transform: scale(1.1);
      box-shadow: 0 12px 40px rgba(108,99,255,.6);
    }

    .chat-fab svg {
      width: 26px; height: 26px; fill: white;
      transition: opacity .2s, transform .2s;
      position: absolute;
    }

    .chat-fab .icon-chat  { opacity:1; transform:scale(1) rotate(0deg); }
    .chat-fab .icon-close { opacity:0; transform:scale(.6) rotate(-90deg); }
    .chat-fab.open .icon-chat  { opacity:0; transform:scale(.6) rotate(90deg); }
    .chat-fab.open .icon-close { opacity:1; transform:scale(1) rotate(0deg); }

    .chat-badge {
      position: absolute; top: 2px; right: 2px;
      width: 14px; height: 14px; border-radius: 50%;
      background: #ff4d6d; border: 2px solid #0c0c0f;
      animation: badgePop .4s cubic-bezier(.34,1.56,.64,1);
    }

    @keyframes badgePop { from{transform:scale(0)} to{transform:scale(1)} }

    .chat-tooltip {
      position: fixed; bottom: 36px; right: 96px;
      background: #1a1a2e; color: #d0d0e0;
      font-size: 13px; padding: 8px 14px;
      border-radius: 10px; border: 1px solid #2a2a40;
      white-space: nowrap; z-index: 9998;
      pointer-events: none; opacity: 0; transform: translateX(8px);
      transition: opacity .2s, transform .2s;
    }

    .chat-tooltip::after {
      content:''; position:absolute; right:-6px; top:50%;
      transform:translateY(-50%);
      border:6px solid transparent; border-right:none;
      border-left-color:#2a2a40;
    }

    .chat-fab:hover ~ .chat-tooltip { opacity:1; transform:translateX(0); }

    .chat-window {
      position: fixed;
      bottom: 100px; right: 28px;
      width: 370px;
      border-radius: 20px; overflow: hidden;
      border: 1px solid #1e1e2e;
      display: flex; flex-direction: column;
      box-shadow: 0 24px 80px rgba(0,0,0,.6), 0 0 0 1px rgba(108,99,255,.1);
      z-index: 9998;
      opacity: 0; transform: translateY(16px) scale(.96);
      pointer-events: none;
      transition: opacity .3s cubic-bezier(.4,0,.2,1), transform .3s cubic-bezier(.4,0,.2,1);
    }

    .chat-window.open {
      opacity: 1; transform: translateY(0) scale(1);
      pointer-events: all;
    }

    .chat-header {
      background: #111118; border-bottom: 1px solid #1e1e2e;
      padding: 14px 16px;
      display: flex; align-items: center; gap: 10px; flex-shrink: 0;
    }

    .avatar {
      width: 38px; height: 38px; border-radius: 50%;
      background: linear-gradient(135deg, #6c63ff, #3ecfcf);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px;
      color: #fff; flex-shrink: 0;
    }

    .header-info h2 {
      font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700;
      color: #f0f0f5; line-height: 1.2;
    }

    .header-info span { font-size: 11px; color: #6c63ff; font-weight: 500; }

    .status {
      margin-left: auto; display: flex; align-items: center; gap: 5px;
      font-size: 11px; color: #3ecfcf;
    }

    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #3ecfcf; box-shadow: 0 0 6px #3ecfcf;
      animation: pulse 2s infinite;
    }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

    .chat-messages {
      background: #0c0c0f; flex: 1; overflow-y: auto;
      padding: 16px; display: flex; flex-direction: column; gap: 12px;
      min-height: 280px; max-height: 320px;
      scrollbar-width: thin; scrollbar-color: #2a2a40 transparent;
    }

    .msg { display: flex; gap: 8px; align-items: flex-end; animation: fadeUp .25s ease; }

    @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

    .msg.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 26px; height: 26px; border-radius: 50%;
      background: linear-gradient(135deg, #6c63ff, #3ecfcf);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; color: #fff;
      flex-shrink: 0; font-family: 'Syne', sans-serif;
    }

    .msg.user .msg-avatar { background: #1a1a2e; color: #9090b0; }

    .msg-bubble {
      max-width: 78%; padding: 10px 14px; border-radius: 16px;
      font-size: 13.5px; line-height: 1.65; font-weight: 300;
    }

    .msg.bot .msg-bubble {
      background: #1a1a2e; color: #d0d0e0;
      border-bottom-left-radius: 4px; border: 1px solid #2a2a40;
    }

    .msg.user .msg-bubble {
      background: linear-gradient(135deg, #6c63ff, #5a52e0);
      color: #fff; border-bottom-right-radius: 4px;
    }

    .suggestions {
      background: #0c0c0f; padding: 0 16px 12px;
      display: flex; gap: 7px; flex-wrap: wrap;
    }

    .suggestion-btn {
      background: #1a1a2e; border: 1px solid #2a2a40; color: #9090b0;
      padding: 5px 11px; border-radius: 20px; font-size: 11.5px;
      cursor: pointer; font-family: 'DM Sans', sans-serif;
      transition: border-color .2s, color .2s, background .2s; white-space: nowrap;
    }

    .suggestion-btn:hover { border-color: #6c63ff; color: #c0b8ff; background: #1e1a3a; }

    .chat-input-area {
      padding: 12px 14px; border-top: 1px solid #1e1e2e;
      display: flex; gap: 8px; background: #111118;
      align-items: center; flex-shrink: 0;
    }

    .chat-input {
      flex: 1; background: #1a1a2e; border: 1px solid #2a2a40;
      border-radius: 20px; padding: 9px 16px; color: #f0f0f5;
      font-size: 13px; font-family: 'DM Sans', sans-serif;
      outline: none; transition: border-color .2s;
    }

    .chat-input::placeholder { color: #4a4a6a; }
    .chat-input:focus { border-color: #6c63ff; }

    .send-btn {
      width: 38px; height: 38px; border-radius: 50%;
      background: linear-gradient(135deg, #6c63ff, #3ecfcf);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform .2s, opacity .2s; flex-shrink: 0;
    }

    .send-btn:hover { transform: scale(1.08); }
    .send-btn:disabled { opacity:.4; cursor:not-allowed; transform:none; }
    .send-btn svg { width: 16px; height: 16px; fill: white; }

    .typing { display:flex; gap:4px; align-items:center; padding:2px 0; }
    .typing span {
      width:5px; height:5px; border-radius:50%; background:#6c63ff;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2){animation-delay:.2s}
    .typing span:nth-child(3){animation-delay:.4s}

    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

    @media (max-width: 420px) {
      .chat-window { width: calc(100vw - 20px); right: 10px; bottom: 90px; }
      .chat-fab { bottom: 20px; right: 16px; }
      .chat-tooltip { display: none; }
    }
  </style>
</head>

    let history = [];
    let welcomed = false;
    let isOpen = false;

    function toggleChat() {
      isOpen = !isOpen;
      document.getElementById('chatFab').classList.toggle('open', isOpen);
      document.getElementById('chatWindow').classList.toggle('open', isOpen);
      document.getElementById('badge').style.display = 'none';

      if (isOpen && !welcomed) {
        welcomed = true;
        setTimeout(() => {
          addMessage('bot', "Bonjour ! 👋 Je suis l'assistant de <strong>Bastien Leblanc</strong>, Data Analyst basé sur la métropole lilloise. Posez-moi vos questions sur son parcours, ses projets ou comment le contacter !");
        }, 200);
        setTimeout(() => document.getElementById('userInput').focus(), 350);
      }
    }

    function scrollBottom() {
      const c = document.getElementById('messages');
      c.scrollTop = c.scrollHeight;
    }

    function addMessage(role, text) {
      const container = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.innerHTML = `<div class="msg-avatar">${role === 'bot' ? 'B' : 'V'}</div><div class="msg-bubble">${text}</div>`;
      container.appendChild(div);
      scrollBottom();
    }

    function addTyping() {
      const container = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = 'msg bot'; div.id = 'typing-indicator';
      div.innerHTML = `<div class="msg-avatar">B</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
      container.appendChild(div); scrollBottom();
    }

    function removeTyping() {
      const el = document.getElementById('typing-indicator');
      if (el) el.remove();
    }

    async function callGemini(userMessage) {
      history.push({ role: 'user', parts: [{ text: userMessage }] });
      const res = await fetch(GEMINI_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
          contents: history
        })
      });
      if (!res.ok) { const e = await res.json(); throw new Error(e?.error?.message || 'Erreur API'); }
      const data = await res.json();
      const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || "Désolé, je n'ai pas pu répondre.";
      history.push({ role: 'model', parts: [{ text: reply }] });
      return reply;
    }

    async function sendMessage() {
      const input = document.getElementById('userInput');
      const btn = document.getElementById('sendBtn');
      const text = input.value.trim();
      if (!text || btn.disabled) return;

      input.value = ''; btn.disabled = true;
      document.getElementById('suggestions').style.display = 'none';
      addMessage('user', text); addTyping();

      try {
        const reply = await callGemini(text);
        removeTyping(); addMessage('bot', reply);
      } catch(e) {
        removeTyping(); addMessage('bot', `⚠️ ${e.message}`);
      }

      btn.disabled = false; input.focus();
    }

    function sendSuggestion(msg) {
      if (!isOpen) toggleChat();
      setTimeout(() => { document.getElementById('userInput').value = msg; sendMessage(); }, welcomed ? 0 : 400);
    }

    document.getElementById('userInput').addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

    setTimeout(() => { if (!isOpen) document.getElementById('badge').style.display = 'block'; }, 3000);
